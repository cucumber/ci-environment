name: test-go

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - go/**
      - CiEnvironments.json
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - go/**
      - CiEnvironments.json
      - testdata/**
      - .github/**

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        go-version: ["1.17.x", "1.18.x"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go/go.sum
      - name: lint
        working-directory: go
        run: gofmt -w .
      - name: Run go vet
        working-directory: go
        run: go vet ./...
      - name: Run go test
        working-directory: go
        run: make test
