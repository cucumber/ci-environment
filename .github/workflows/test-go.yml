---
name: test-go
on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - go/**
      - CiEnvironments.json
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - go/**
      - CiEnvironments.json
      - testdata/**
      - .github/**

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        go-version: ["1.17.x", "1.18.x"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go/go.sum
      - name: lint
        working-directory: go
        run: gofmt -w .
      - name: Run go vet
        working-directory: go
        run: go vet ./...
      - name: Run go test
        working-directory: go
        run: make test
